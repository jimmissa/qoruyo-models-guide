name: Documentation smoke test

on:
  pull_request:
  push:

jobs:
  docs-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check shell examples
        run: |
          set -euo pipefail
          find examples scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Check that model binaries are not committed
        run: |
          set -euo pipefail
          if find . -name '*.mlmodel' -print -quit | grep -q .; then
            echo "Model binaries should remain on Zenodo, not in this repository."
            exit 1
          fi

      - name: Check for local absolute paths
        run: |
          set -euo pipefail
          if grep -RIn '/Users/' README.md CITATION.cff NOTICE.md docs examples scripts; then
            echo "Documentation should use portable paths rather than local machine paths."
            exit 1
          fi
